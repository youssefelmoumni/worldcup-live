<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Live</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="bg"></div>

<header class="header">

<div class="logo">
🏆 World Cup Live
</div>

<div class="menu">
<i class="fa-solid fa-bars"></i>
</div>

</header>

<section class="hero">

<h1>FIFA World Cup 2026</h1>

<p>
Live Matches • Results • Fixtures • News
</p>

<button class="btn">
Watch Live Scores
</button>

</section>

<section class="cards">

<div class="card">

<div class="icon">
⚽
</div>

<h2>Live Matches</h2>

<p id="matches">
Loading...
</p>

</div>

<div class="card">

<div class="icon">
📰
</div>

<h2>Latest News</h2>

<p id="news">
Loading...
</p>

</div>

<div class="card">

<div class="icon">
📅
</div>

<h2>Fixtures</h2>

<p>
Coming Soon
</p>

</div>

<div class="card">

<div class="icon">
📊
</div>

<h2>Standings</h2>

<p>
Coming Soon
</p>

</div>

<div class="card">

<div class="icon">
🥇
</div>

<h2>Top Scorers</h2>

<p>
Coming Soon
</p>

</div>

</section>

<nav class="bottom-nav">

<a class="active">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a>
<i class="fa-solid fa-futbol"></i>
<span>Matches</span>
</a>

<a>
<i class="fa-solid fa-newspaper"></i>
<span>News</span>
</a>

<a>
<i class="fa-solid fa-chart-column"></i>
<span>Standings</span>
</a>

<a>
<i class="fa-solid fa-gear"></i>
<span>More</span>
</a>

</nav>

<script src="script.js"></script>

</body>
</html>
